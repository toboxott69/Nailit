    <style>
    .analysis-page { padding: 100px 0 60px; min-height: 100vh; background: var(--bg-deep); }
    .analysis-page .directory-back-link {
        display: inline-flex; align-items: center; gap: 8px;
        color: var(--muted); text-decoration: none; font-size: 0.95rem;
        margin-bottom: 24px; transition: color 0.2s;
    }
    .analysis-page .directory-back-link:hover { color: var(--brand); }
    .scan-flow { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 0; }
    .scan-photo-card {
        background: var(--surface-strong); border: 1px solid var(--line);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow: hidden; position: relative;
    }
    .scan-photo-card img { width: 100%; max-height: 320px; object-fit: cover; display: block; }
    .scan-photo-badge {
        position: absolute; top: 14px; left: 14px;
        background: rgba(0,0,0,0.55); color: #fff; padding: 6px 14px;
        border-radius: 20px; font-size: 0.8rem; font-weight: 600; backdrop-filter: blur(6px);
    }
    .scan-photo-badge i { margin-right: 6px; }
    .scan-chat {
        background: var(--surface-strong); border: 1px solid var(--line); border-top: none;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        display: flex; flex-direction: column;
    }
    .scan-chat-messages {
        padding: 20px; display: flex; flex-direction: column; gap: 14px;
        max-height: 350px; overflow-y: auto; min-height: 80px;
    }
    .scan-msg { display: flex; gap: 10px; align-items: flex-start; animation: msgIn 0.3s ease; }
    @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .scan-msg-bot { flex-direction: row; }
    .scan-msg-user { flex-direction: row-reverse; }
    .scan-msg-avatar {
        width: 34px; height: 34px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.85rem; flex-shrink: 0;
    }
    .scan-msg-bot .scan-msg-avatar { background: var(--brand); color: #fff; }
    .scan-msg-user .scan-msg-avatar { background: var(--line-strong); color: var(--ink); }
    .scan-msg-bubble {
        background: var(--bg-deep); border: 1px solid var(--line); border-radius: 18px;
        padding: 12px 16px; font-size: 0.92rem; line-height: 1.5; max-width: 85%; color: var(--ink);
    }
    .scan-msg-user .scan-msg-bubble { background: var(--brand); color: #fff; border-color: var(--brand); }
    .scan-typing { display: flex; gap: 5px; padding: 4px 0; }
    .scan-typing span { width:8px; height:8px; border-radius:50%; background:var(--muted); animation:typeDot 1.4s infinite; }
    .scan-typing span:nth-child(2) { animation-delay:0.2s; }
    .scan-typing span:nth-child(3) { animation-delay:0.4s; }
    @keyframes typeDot { 0%,60%,100%{opacity:.3;transform:scale(.8)} 30%{opacity:1;transform:scale(1.1)} }
    .scan-chat-input {
        border-top: 1px solid var(--line); padding: 14px 16px;
        display: flex; gap: 10px; align-items: center;
    }
    .scan-chat-input input {
        flex:1; border:1px solid var(--line); background:var(--bg); color:var(--ink);
        border-radius:24px; padding:12px 18px; font-size:0.95rem;
        font-family:'Manrope',sans-serif; outline:none; transition:border-color 0.2s;
    }
    .scan-chat-input input:focus { border-color: var(--brand); }
    .scan-chat-input input::placeholder { color: var(--muted); }
    .scan-chat-input button {
        width:44px; height:44px; border-radius:50%; border:none;
        background:var(--brand); color:#fff; font-size:1.1rem; cursor:pointer;
        display:flex; align-items:center; justify-content:center;
        transition:background 0.2s,transform 0.15s; flex-shrink:0;
    }
    .scan-chat-input button:hover { background:var(--brand-dark); transform:scale(1.05); }
    .scan-chat-input button:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .scan-result { display:none; max-width:600px; margin:28px auto 0; flex-direction:column; gap:18px; animation:msgIn .4s ease; }
    .scan-result.is-visible { display:flex; }
    .scan-result-card { background:var(--surface-strong); border:1px solid var(--line); border-radius:var(--radius-lg); padding:24px; }
    .scan-result-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .scan-result-header i { font-size:1.6rem; color:var(--brand); }
    .scan-result-header h3 { font-size:1.15rem; font-weight:700; color:var(--ink); margin:0; }
    .scan-result-summary { color:var(--muted); font-size:.95rem; line-height:1.6; margin-bottom:16px; }
    .scan-result-tags { display:flex; gap:10px; flex-wrap:wrap; }
    .scan-result-tag {
        background:var(--accent-soft); border:1px solid var(--line); border-radius:12px;
        padding:10px 16px; text-align:center; flex:1; min-width:100px;
    }
    .scan-result-tag span { display:block; font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:4px; }
    .scan-result-tag strong { font-size:1rem; color:var(--brand); }
    .scan-contractors { display:none; max-width:600px; margin:28px auto 0; flex-direction:column; gap:18px; animation:msgIn .4s ease; }
    .scan-contractors.is-visible { display:flex; }
    .scan-contractors-header h3 { font-size:1.1rem; font-weight:700; color:var(--ink); margin:0; display:flex; align-items:center; gap:8px; }
    .scan-contractors-header h3 i { color:var(--brand); }
    .scan-location-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .scan-location-btn {
        display:inline-flex; align-items:center; gap:8px; padding:10px 18px;
        border-radius:24px; border:1px solid var(--brand); background:transparent;
        color:var(--brand); font-size:.88rem; font-weight:600;
        font-family:'Manrope',sans-serif; cursor:pointer; transition:all .2s;
    }
    .scan-location-btn:hover { background:var(--brand); color:#fff; }
    .scan-location-btn.active { background:var(--brand); color:#fff; border-color:var(--brand); }
    .scan-city-select {
        padding:10px 16px; border-radius:24px; border:1px solid var(--line);
        background:var(--bg); color:var(--ink); font-family:'Manrope',sans-serif;
        font-size:.88rem; cursor:pointer; outline:none;
    }
    .scan-city-select:focus { border-color:var(--brand); }
    .scan-contractor-list { display:flex; flex-direction:column; gap:12px; }
    .scan-contractor-card {
        background:var(--surface-strong); border:1px solid var(--line); border-radius:var(--radius-md);
        padding:18px 20px; display:flex; align-items:center; gap:16px;
        transition:border-color .2s,box-shadow .2s;
    }
    .scan-contractor-card:hover { border-color:var(--brand); box-shadow:0 4px 20px rgba(255,102,0,.1); }
    .scan-contractor-info { flex:1; min-width:0; }
    .scan-contractor-name { font-weight:700; font-size:1rem; color:var(--ink); margin:0 0 4px; display:flex; align-items:center; gap:8px; }
    .scan-contractor-avail { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .scan-contractor-avail.green { background:#22c55e; }
    .scan-contractor-avail.yellow { background:#f59e0b; }
    .scan-contractor-avail.red { background:#ef4444; }
    .scan-contractor-meta { font-size:.82rem; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap; }
    .scan-contractor-meta i { color:var(--brand); margin-right:4px; }
    .scan-contractor-price { font-size:.85rem; font-weight:700; color:var(--brand); margin-top:4px; }
    .scan-contractor-distance { font-size:.78rem; color:var(--muted); margin-top:2px; }
    .scan-contractor-actions { display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
    .scan-call-btn {
        display:inline-flex; align-items:center; justify-content:center; gap:6px;
        padding:10px 20px; border-radius:24px; border:none; background:#22c55e; color:#fff;
        font-size:.85rem; font-weight:700; font-family:'Manrope',sans-serif;
        cursor:pointer; transition:background .2s,transform .15s; text-decoration:none; white-space:nowrap;
    }
    .scan-call-btn:hover { background:#16a34a; transform:scale(1.03); }
    .scan-view-btn {
        display:inline-flex; align-items:center; justify-content:center; gap:6px;
        padding:8px 16px; border-radius:24px; border:1px solid var(--line); background:transparent;
        color:var(--muted); font-size:.8rem; font-weight:600; font-family:'Manrope',sans-serif;
        cursor:pointer; transition:all .2s; text-decoration:none;
    }
    .scan-view-btn:hover { border-color:var(--brand); color:var(--brand); }
    .scan-no-results { text-align:center; padding:30px; color:var(--muted); font-size:.95rem; }
    .scan-no-results i { font-size:2rem; display:block; margin-bottom:10px; color:var(--line-strong); }
    .scan-all-btn {
        display:block; text-align:center; padding:14px; border-radius:var(--radius-md);
        border:1px dashed var(--line-strong); color:var(--brand); font-weight:700; font-size:.95rem;
        text-decoration:none; transition:all .2s;
    }
    .scan-all-btn:hover { background:var(--accent-soft); border-style:solid; }
    .scan-all-btn i { margin-right:6px; }
    @media (max-width:640px) {
        .scan-flow { margin:0 -8px; }
        .scan-photo-card img { max-height:240px; }
        .scan-chat-messages { max-height:280px; padding:14px; }
        .scan-result,.scan-contractors { margin-left:-8px; margin-right:-8px; }
        .scan-contractor-card { flex-direction:column; align-items:stretch; }
        .scan-contractor-actions { flex-direction:row; }
        .scan-result-tags { flex-direction:column; }
    }
    </style>

        var imageDataUrl = sessionStorage.getItem('nailit-scan-image');
        var chatHistory = [];
        var analysisResult = null;
        var userLat = null, userLng = null;
        var selectedCity = '';

        var scanPhoto = document.getElementById('scanPhoto');
        if (imageDataUrl && scanPhoto) scanPhoto.src = imageDataUrl;

        var chatMessages = document.getElementById('chatMessages');
        var chatForm = document.getElementById('chatForm');
        var chatInput = document.getElementById('chatInput');
        var chatSendBtn = document.getElementById('chatSendBtn');

        function addMsg(text, type) {
            var d = document.createElement('div');
            d.className = 'scan-msg scan-msg-' + type;
            d.innerHTML = '<div class="scan-msg-avatar"><i class="fas fa-' + (type==='bot'?'robot':'user') + '"></i></div>'
                + '<div class="scan-msg-bubble">' + text + '</div>';
            chatMessages.appendChild(d);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function showTyping() {
            var d = document.createElement('div');
            d.className = 'scan-msg scan-msg-bot scan-msg-typing';
            d.innerHTML = '<div class="scan-msg-avatar"><i class="fas fa-robot"></i></div>'
                + '<div class="scan-msg-bubble"><div class="scan-typing"><span></span><span></span><span></span></div></div>';
            chatMessages.appendChild(d);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function removeTyping() {
            var t = chatMessages.querySelector('.scan-msg-typing');
            if (t) t.remove();
        }

        function getDistanceKm(lat1, lng1, lat2, lng2) {
            var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
            var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        function getAnfahrt(km) {
            if (km<=5) return 0; if (km<=10) return 15; if (km<=15) return 25;
            if (km<=25) return 39; if (km<=50) return 59; return 79;
        }
        var tradeLabels = { 'sanitär':'Sanitär','elektro':'Elektro','dach':'Dachdecker','maler':'Maler','allround':'Allround' };

        function renderContractors() {
            if (!analysisResult) return;
            var trade = analysisResult.trade || '';
            var list = document.getElementById('contractorList');
            list.innerHTML = '';

            var filtered = businesses.filter(function(b) { return b.trade===trade; });
            if (selectedCity) filtered = filtered.filter(function(b) { return b.city===selectedCity; });

            if (userLat !== null) {
                filtered.forEach(function(b) { b._dist = getDistanceKm(userLat, userLng, b.lat, b.lng); });
                filtered.sort(function(a,b) { return a._dist - b._dist; });
            } else {
                var order = {green:0,yellow:1,red:2};
                filtered.sort(function(a,b) { return (order[a.avail]||2)-(order[b.avail]||2); });
            }

            if (!filtered.length) {
                list.innerHTML = '<div class="scan-no-results"><i class="fas fa-search"></i>Keine Betriebe gefunden. Wähle eine andere Stadt oder zeige alle an.</div>';
                return;
            }

            filtered.forEach(function(b) {
                var card = document.createElement('div');
                card.className = 'scan-contractor-card';
                var distHtml = '';
                if (b._dist !== undefined) {
                    var km = Math.round(b._dist*10)/10, anfahrt = getAnfahrt(km);
                    distHtml = '<div class="scan-contractor-distance"><i class="fas fa-route"></i> '
                        + km + ' km - Anfahrt: ' + (anfahrt===0 ? '<strong style="color:#22c55e">Kostenlos</strong>' : anfahrt+' €') + '</div>';
                }
                card.innerHTML = '<div class="scan-contractor-info">'
                    + '<p class="scan-contractor-name"><span class="scan-contractor-avail '+b.avail+'"></span>'+b.name+'</p>'
                    + '<div class="scan-contractor-meta"><span><i class="fas fa-map-marker-alt"></i>'+b.city+'</span><span><i class="fas fa-wrench"></i>'+b.desc+'</span></div>'
                    + '<div class="scan-contractor-price"><i class="fas fa-tag"></i> ab '+b.priceFrom+' € - '+b.priceTo+' €</div>'
                    + distHtml + '</div>'
                    + '<div class="scan-contractor-actions">'
                    + '<a href="tel:'+b.phone+'" class="scan-call-btn"><i class="fas fa-phone"></i> Anrufen</a>'
                    + '<a href="contractors.html?q='+encodeURIComponent(b.name)+'" class="scan-view-btn"><i class="fas fa-arrow-right"></i> Details</a>'
                    + '</div>';
                list.appendChild(card);
            });
            document.getElementById('allContractorsLink').href = 'contractors.html?trade=' + encodeURIComponent(trade);
        }

        function showResults(data) {
            analysisResult = data;
            document.getElementById('resultTitle').textContent = data.title || 'Analyse abgeschlossen';
            document.getElementById('resultSummary').textContent = data.summary || '';
            document.getElementById('resultTrade').textContent = tradeLabels[data.trade] || data.trade || '-';
            document.getElementById('resultPriority').textContent = data.priority || '-';
            document.getElementById('resultConfidence').textContent = data.confidence || '-';
            document.getElementById('scanResult').classList.add('is-visible');
            document.getElementById('scanContractors').classList.add('is-visible');
            renderContractors();
            setTimeout(function() {
                document.getElementById('scanResult').scrollIntoView({ behavior:'smooth', block:'start' });
            }, 100);
        }

        async function runAnalysis(description) {
            showTyping();
            try {
                var payload = { description: description || 'Bitte analysiere dieses Foto.', location:'', propertyType:'', urgency:'mittel', imageDataUrl: imageDataUrl };
                var response = await fetch('/api/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
                removeTyping();
                if (!response.ok) { var err = await response.json().catch(function(){return{};}); throw new Error(err.error||'Analyse fehlgeschlagen'); }
                var result = await response.json();
                chatHistory.push({ role:'assistant', content: result.title+': '+result.summary });
                var tradeLabel = tradeLabels[result.trade] || result.trade;
                addMsg('<strong>Analyse: '+result.title+'</strong><br><br>'+result.summary+'<br><br><strong>Du brauchst: '+tradeLabel+'</strong><br>Priorität: '+result.priority+' | Sicherheit: '+result.confidence, 'bot');
                showResults(result);
                chatInput.placeholder = 'Folgefrage stellen...';
            } catch(err) {
                removeTyping();
                addMsg('Fehler: '+err.message, 'bot');
            }
        }

        async function sendFollowUp(message) {
            chatHistory.push({ role:'user', content:message });
            showTyping();
            try {
                var response = await fetch('/api/analysis-chat', { method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ messages:chatHistory, context:analysisResult, imageDataUrl:imageDataUrl }) });
                removeTyping();
                if (!response.ok) throw new Error('Chat-Anfrage fehlgeschlagen');
                var data = await response.json();
                var reply = data.reply || 'Entschuldigung, keine Antwort möglich.';
                chatHistory.push({ role:'assistant', content:reply });
                addMsg(reply.replace(/\n/g,'<br>'), 'bot');
            } catch(err) { removeTyping(); addMsg('Fehler: '+err.message, 'bot'); }
        }

        var firstMessage = true;
        if (chatForm) {
            chatForm.addEventListener('submit', function(e) {
                e.preventDefault();
                var msg = chatInput.value.trim();
                if (!msg) return;
                addMsg(msg, 'user');
                chatInput.value = '';
                if (firstMessage) { firstMessage = false; chatHistory.push({role:'user',content:msg}); runAnalysis(msg); }
                else { sendFollowUp(msg); }
            });
        }

        if (!imageDataUrl) {
            document.querySelector('.scan-photo-card').style.display = 'none';
            document.querySelector('.scan-chat .scan-msg-bubble').innerHTML = 'Kein Foto gefunden. Kein Problem! Beschreibe einfach dein Problem und ich helfe dir.';
        }

        var locationBtn = document.getElementById('locationBtn');
        if (locationBtn) {
            locationBtn.addEventListener('click', function() {
                if (userLat !== null) { userLat=null; userLng=null; locationBtn.classList.remove('active'); locationBtn.innerHTML='<i class="fas fa-location-crosshairs"></i> Standort aktivieren'; renderContractors(); return; }
                locationBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Suche...';
                navigator.geolocation.getCurrentPosition(function(pos) {
                    userLat=pos.coords.latitude; userLng=pos.coords.longitude;
                    locationBtn.classList.add('active'); locationBtn.innerHTML='<i class="fas fa-location-dot"></i> Standort aktiv';
                    renderContractors();
                }, function() {
                    locationBtn.innerHTML='<i class="fas fa-location-crosshairs"></i> Nicht verfügbar';
                    setTimeout(function(){ locationBtn.innerHTML='<i class="fas fa-location-crosshairs"></i> Standort aktivieren'; },2000);
                }, {enableHighAccuracy:true, timeout:8000});
            });
        }

        var citySelect = document.getElementById('citySelect');
        if (citySelect) citySelect.addEventListener('change', function() { selectedCity=this.value; renderContractors(); });
    })();

    (function() {
        var toggle=document.getElementById('themeToggle'), icon=document.getElementById('themeIcon'), html=document.documentElement;
        if (localStorage.getItem('nailit-theme')==='dark') { html.setAttribute('data-theme','dark'); icon.classList.replace('fa-moon','fa-sun'); }
        if (toggle) toggle.addEventListener('click', function() {
            var isDark = html.getAttribute('data-theme')==='dark';
            if (isDark) { html.removeAttribute('data-theme'); icon.classList.replace('fa-sun','fa-moon'); localStorage.setItem('nailit-theme','light'); }
            else { html.setAttribute('data-theme','dark'); icon.classList.replace('fa-moon','fa-sun'); localStorage.setItem('nailit-theme','dark'); }
        });
    })();

    (function() {
        var h=document.getElementById('hamburger'), n=document.getElementById('navLinks');
        if (h&&n) h.addEventListener('click', function() { n.classList.toggle('active'); h.classList.toggle('active'); });
    })();
